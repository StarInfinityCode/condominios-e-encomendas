<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Usuários</title>
    <link rel="stylesheet" href="/css/usuarios.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <strong>CondoEntregas</strong>
                <span>Gestão de Encomendas</span>
            </div>

            <div class="user">
                <strong id="userName">Carregando...</strong>
                <span class="badge admin">Administrador</span>
            </div>

            <nav>
                <ul>
                    <li>
                        <a href="/index.html">
                            <i class="fas fa-chart-line"></i> Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="/nova-encomenda.html">
                            <i class="fas fa-box"></i> Nova Encomenda
                        </a>
                    </li>
                    <li>
                        <a href="/retirada.html">
                            <i class="fas fa-check-circle"></i> Confirmar Retirada
                        </a>
                    </li>
                    <li>
                        <a href="/relatorios.html">
                            <i class="fas fa-file-alt"></i> Relatórios
                        </a>
                    </li>
                    <li class="active">
                        <a href="/usuarios.html">
                            <i class="fas fa-users"></i> Usuários
                        </a>
                    </li>
                </ul>
            </nav>

            <button id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                Sair
            </button>
        </aside>

        <!-- MAIN -->
        <main class="main users-page">

            <!-- HEADER -->
            <div class="header-users">
                <div>
                    <h1>Gerenciar Usuários</h1>
                    <p id="totalUsuarios">2 usuários cadastrados</p>
                </div>

                <button class="btn-gradient">
                    <i class="fas fa-user-plus"></i>
                    Convidar Usuário
                </button>
            </div>

            <!-- BUSCA -->
            <div class="search-box-modern">
                <i class="fas fa-search"></i>
                <input type="text" id="searchUser" placeholder="Buscar usuário..." />
            </div>

            <!-- LISTA -->
            <div id="listaUsuarios" class="users-grid"></div>

        </main>

    </div>

    <script src="/js/usuarios.js"></script>
</body>

</html>
