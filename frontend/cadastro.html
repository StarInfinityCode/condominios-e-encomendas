<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>CondoEntregas</title>
    <link rel="stylesheet" href="/css/cadastro.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <div class="logo">📦</div>

            <h1>Bem vindo ao CondoEntregas</h1>
            <p>Cadastre-se para continuar</p>


            <form id="cadastroForm">

                <label>Nome</label>
                <input type="text" name="name" placeholder="Seu nome">

                <label>Telefone</label>
                <input type="text" name="username" placeholder="Seu telefone">

                <label>Apartamento</label>
                <input type="text" name="model" placeholder="Número do apartamento">

                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com">

                <label>Senha</label>
                <input type="password" name="password" placeholder="••••••">

                <button type="submit" class="login-btn">Cadastrar</button>

            </form>

            </form>

            <div class="footer">
                <a href="/reset_password.html">Esqueceu sua senha?</a>
                <a href="login.html">Login</a>
            </div>

        </div>

    </div>

    <script src="/js/cadastro.js"></script>
</body>

</html>
