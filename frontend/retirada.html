<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Retirada</title>
    <link rel="stylesheet" href="/css/retirada.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <strong>CondoEntregas</strong>
                <span>Gestão de Encomendas</span>
            </div>

            <div class="user">
                <strong id="userName">Carregando...</strong>
                <span class="badge admin">Administrador</span>
            </div>

            <nav>
                <ul>
                    <li>
                        <a href="/index.html">
                            <i class="fas fa-chart-line"></i> Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="/nova-encomenda.html">
                            <i class="fas fa-box"></i> Nova Encomenda
                        </a>
                    </li>
                    <li class="active">
                        <a href="/retirada.html">
                            <i class="fas fa-check-circle"></i> Confirmar Retirada
                        </a>
                    </li>
                    <li>
                        <a href="/relatorios.html">
                            <i class="fas fa-file-alt"></i> Relatórios
                        </a>
                    </li>
                    <li>
                        <a href="/usuarios.html">
                            <i class="fas fa-users"></i> Usuários
                        </a>
                    </li>
                </ul>
            </nav>

            <button id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                Sair
            </button>
        </aside>

        <main class="main center">

            <div class="top-bar">
                <!-- <i class="fas fa-arrow-left back-btn"></i> -->
                <div>
                    <h1>Confirmar Retirada</h1>
                    <p>Digite ou escaneie o código</p>
                </div>
            </div>

            <div class="card-modern">

                <div class="search-box-modern">
                    <i class="fas fa-qrcode icon-left"></i>

                    <input type="text" id="codigoRetirada" placeholder="DIGITE O CÓDIGO..." />

                    <button id="btnBuscar">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <div id="feedback" class="feedback hidden"></div>

            </div>

        </main>

    </div>

    <script src="/js/retirada.js"></script>
</body>

</html>
