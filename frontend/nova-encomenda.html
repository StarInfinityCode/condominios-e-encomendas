<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Nova Encomenda</title>
  <link rel="stylesheet" href="/css/nova-encomenda.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <strong>CondoEntregas</strong>
        <span>Gestão de Encomendas</span>
      </div>

      <div class="user">
        <strong id="userName">Carregando...</strong>
        <span class="badge admin">Administrador</span>
      </div>

      <nav>
        <ul>
          <li>
            <a href="/index.html">
              <i class="fas fa-chart-line"></i> Dashboard
            </a>
          </li>
          <li class="active">
            <a href="/nova-encomenda.html">
              <i class="fas fa-box"></i> Nova Encomenda
            </a>
          </li>
          <li>
            <a href="/retirada.html">
              <i class="fas fa-check-circle"></i> Confirmar Retirada
            </a>
          </li>
          <li>
            <a href="/relatorios.html">
              <i class="fas fa-file-alt"></i> Relatórios
            </a>
          </li>
          <li>
            <a href="/usuarios.html">
              <i class="fas fa-users"></i> Usuários
            </a>
          </li>
        </ul>
      </nav>

      <button id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        Sair
      </button>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <div class="page-header">
        <h1>Nova Encomenda</h1>
        <p>Cadastrar encomenda recebida na portaria</p>
      </div>

      <div class="card">

        <form id="formEncomenda">

          <!-- Morador -->
          <div class="form-group">
            <label>Morador *</label>
            <select id="morador" required>
              <option value="">Selecione o morador</option>
            </select>
          </div>

          <!-- Descrição -->
          <div class="form-group">
            <label>Descrição da Encomenda *</label>
            <textarea id="descricao" rows="4" required
              placeholder="Ex: Caixa grande, Mercado Livre; Envelope pequeno..."></textarea>
          </div>

          <!-- Remetente -->
          <div class="form-group">
            <label>Remetente / Transportadora</label>
            <input type="text" id="remetente" placeholder="Ex: Correios, Mercado Livre, Amazon..." />
          </div>

          <button type="submit" class="btn-primary">
            <i class="fas fa-box"></i>
            Cadastrar Encomenda
          </button>

        </form>

      </div>

    </main>

  </div>

  <script src="/js/nova-encomenda.js"></script>
</body>

</html>
