<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetar Senha</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: hsl(240, 7%, 97%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .reset-container {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            position: relative;
        }
        .back-link {
            color: #0066cc;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            display: inline-block;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin: 0 0 8px 0;
        }
        .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin: 0 0 24px 0;
            line-height: 1.5;
        }
        .email-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .email-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }
        .email-input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background: white;
        }
        .email-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .email-input::placeholder {
            color: #9ca3af;
        }
        .send-button {
            width: 100%;
            background: #1f2937;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-button:hover {
            background: #111827;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <a href="/login.html" class="back-link">← Voltar para entrar</a>
        <h1 class="title">Resetar sua senha</h1>
        <p class="subtitle">Digite seu email e enviaremos um link para resetar sua senha</p>
        <form>
            <div class="email-input-wrapper">
                <span class="email-icon">📧</span>
                <input type="email" class="email-input" placeholder="seu@email.com" value="voce@example.com" required>
            </div>
            <button type="submit" class="send-button">Enviar link de reset</button>
        </form>
    </div>
</body>
</html>
